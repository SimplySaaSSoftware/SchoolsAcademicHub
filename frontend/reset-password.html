<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>
<main class="login-page" role="main">
  <div class="login-card">
    <h1 class="login-card__title">Set New Password</h1>
    <div id="error-banner" class="error-banner" role="alert" hidden></div>
    <form id="reset-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="new-password">New Password</label>
        <input id="new-password" class="form-control" type="password" minlength="8" required autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <input id="confirm-password" class="form-control" type="password" minlength="8" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn--primary">Update Password</button>
    </form>
  </div>
</main>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const school = params.get('school');
const errBanner = document.getElementById('error-banner');

if (!token || !school) {
  errBanner.textContent = 'Invalid reset link.';
  errBanner.hidden = false;
  document.getElementById('reset-form').hidden = true;
}

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  errBanner.hidden = true;
  const pw  = document.getElementById('new-password').value;
  const pw2 = document.getElementById('confirm-password').value;
  if (pw !== pw2) { errBanner.textContent = 'Passwords do not match.'; errBanner.hidden = false; return; }
  if (pw.length < 8) { errBanner.textContent = 'Password must be at least 8 characters.'; errBanner.hidden = false; return; }

  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    await confirmPasswordReset(school, token, pw);
    errBanner.className = 'error-banner error-banner--success';
    errBanner.textContent = 'Password updated! Redirecting to login…';
    errBanner.hidden = false;
    setTimeout(() => { window.location.href = `/${school}`; }, 2000);
  } catch (err) {
    errBanner.textContent = err.message;
    errBanner.hidden = false;
    btn.disabled = false; btn.textContent = 'Update Password';
  }
});
</script>
</body>
</html>
